<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nisa & Üveys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=block" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ede9de;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 0.5rem;
    font-family: 'Lato', sans-serif;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #ede9de;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.8rem;
    transition: opacity 0.7s ease;
  }
  #splash.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-names {
    font-family: 'Pinyon Script', cursive;
    font-size: 3rem;
    color: #8b7535;
    letter-spacing: 1px;
    text-align: center;
  }
  .splash-heart { color: #b8963e; }
  .splash-sub {
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: #a08840;
    text-transform: uppercase;
    text-align: center;
  }
  .splash-btn {
    background: linear-gradient(135deg, #c4a84a, #9a7d2e);
    color: #fffdf7;
    border: none;
    border-radius: 50px;
    padding: 13px 36px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(154,125,46,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .splash-btn:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(154,125,46,0.45); }
  .splash-divider {
    width: 120px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, #c4a84a, transparent);
  }

  /* ── DAVETIYE ── */
  .inv-wrap {
    background: #f5f2eb;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid #d4bc85;
    max-width: 480px;
    width: 100%;
  }

  .inv-header {
    background: #f5f2eb;
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid #e0d0a8;
    position: relative;
  }

  .botanical-svg {
    display: block;
    margin: 0 auto 1rem;
    width: 90px;
    height: 130px;
  }

  .couple-names {
    font-family: 'Pinyon Script', cursive;
    font-size: 2.5rem;
    color: #8b7535;
    line-height: 1.1;
    letter-spacing: 1px;
  }

  .heart-sep {
    font-size: 1.7rem;
    color: #b8963e;
    margin: 0 0.4rem;
    vertical-align: middle;
  }

  .header-spacer { height: 0.8rem; }

  .gold-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 1rem 2rem;
    color: #c4a84a;
    font-size: 0.7rem;
    letter-spacing: 3px;
  }

  .gold-divider::before,
  .gold-divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, #c4a84a, transparent);
  }

  .inv-body { padding: 0 1.5rem 2rem; }

  .events-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .event-card {
    background: #fffdf7;
    border-radius: 14px;
    border: 1px solid #d8c47a;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .event-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #c4a84a, #e8d07a, #c4a84a);
  }

  .event-card:active {
    transform: scale(0.975);
    box-shadow: 0 2px 12px rgba(154,125,46,0.25);
    background: #fdf8ec;
  }

  .event-card .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(196,168,74,0.25);
    transform: scale(0);
    animation: rippleAnim 0.55s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  .event-type {
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 400;
  }

  .event-info { display: flex; flex-direction: column; gap: 7px; margin-bottom: 0.9rem; }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 0.78rem;
    color: #4a3e1e;
    line-height: 1.4;
  }

  .date-val {
    font-family: 'Lato', sans-serif;
    font-weight: 400; font-size: 0.85rem; color: #6b5520;
  }

  .venue-name { font-weight: 400; color: #3d3010; }
  .venue-addr { font-size: 0.7rem; color: #7a6530; margin-top: 2px; }

  .event-note {
    font-size: 0.68rem;
    color: #8b7535;
    font-style: italic;
    border-top: 0.5px solid #e0d0a8;
    padding-top: 0.6rem;
    line-height: 1.5;
  }

  .countdown-box {
    background: linear-gradient(135deg, #fdf8ec, #fff9f0);
    border: 1px solid #dcc870;
    border-radius: 10px;
    padding: 0.75rem 0.5rem;
    margin-top: 0.75rem;
  }

  .cd-label {
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: #a08840;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.45rem;
  }

  .cd-numbers {
    display: flex;
    justify-content: center;
    gap: 5px;
    align-items: center;
  }

  .cd-unit { display: flex; flex-direction: column; align-items: center; min-width: 32px; }

  .cd-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: #7a5e18;
    line-height: 1;
  }

  .cd-name {
    font-size: 0.5rem;
    color: #a08840;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .cd-sep { font-size: 1.1rem; color: #c4a84a; line-height: 1.5; font-weight: 300; }

</style>
<style>body{opacity:0;transition:opacity 0.3s ease}</style>

<audio id="bg-music" loop preload="auto">
  <source src="https://raw.githubusercontent.com/uveyssarac/uveyssarac.github.io/main/muzik.mp3" type="audio/mpeg">

<canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;"></canvas>

<script>
  // ── SPLASH + MÜZİK ──
  let isMusicPlaying = false; 

  function openInvitation() {
    const audioElement = document.getElementById('bg-music');
    
    if (audioElement) {
      audioElement.volume = 0.5;
      audioElement.play()
        .then(() => { isMusicPlaying = true; })
        .catch((err) => { console.log("Müzik çalınamadı:", err); });
    }

    const splash = document.getElementById('splash');
    if (splash) {
      splash.classList.add('hide');
      setTimeout(() => splash.style.display = 'none', 700);
    }
  }

  // ── SEKME DEĞİŞİKLİĞİ KONTROLÜ ──
  document.addEventListener('visibilitychange', function() {
    const audioElement = document.getElementById('bg-music');
    if (!audioElement || !isMusicPlaying) return; 

    if (document.hidden) {
      audioElement.pause();
    } else {
      audioElement.play().catch(() => {});
    }
  });

  // ── COUNTDOWN ──
  function calcCD(target) {
    const diff = target - new Date();
    if (diff <= 0) return {g:0,s:0,d:0,sn:0};
    const t = Math.floor(diff/1000);
    return { sn: t%60, d: Math.floor(t/60)%60, s: Math.floor(t/3600)%24, g: Math.floor(t/86400) };
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  const dugun = new Date('2026-07-25T16:30:00'); // Karttaki tarih ile eşitlendi (23 Temmuz)

  function tick() {
    const d = calcCD(dugun);
    document.getElementById('d-g').textContent  = pad(d.g);
    document.getElementById('d-s').textContent  = pad(d.s);
    document.getElementById('d-d').textContent  = pad(d.d);
    document.getElementById('d-sn').textContent = pad(d.sn);
  }
  tick();
  setInterval(tick, 1000);

  // ── KART RIPPLE + HARİTA ──
  function addRipple(card, e) {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY || rect.top  + rect.height/2) - rect.top;
    const size = Math.max(rect.width, rect.height) * 1.2;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
    card.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  document.getElementById('card-dugun').addEventListener('click', function(e) {
    addRipple(this, e);
    setTimeout(() => window.open('https://maps.app.goo.gl/BR6yXp9JEeGa89W68','_blank'), 200);
  });
</script>

<script>
(function(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#c4a84a','#d8c47a','#b8963e','#e8d07a','#9a7d2e','#f5f2eb','#d4bc85','#a08840'];

  const particles = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 3 + 1,
    d: Math.random() * 2 + 0.5,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 10 - 5,
    tiltSpeed: Math.random() * 0.05 + 0.01,
    tiltAngle: 0,
    shape: Math.random() > 0.5 ? 'circle' : 'rect',
    opacity: Math.random() * 0.6 + 0.4
  }));

  let frame = 0;
  const maxFrames = 280;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    const fadeStart = 180;
    const globalOpacity = frame > fadeStart ? 1 - (frame - fadeStart) / (maxFrames - fadeStart) : 1;

    particles.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += p.d;
      p.tilt = Math.sin(p.tiltAngle) * 6;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      ctx.save();
      ctx.globalAlpha = p.opacity * globalOpacity;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.tilt * Math.PI / 180);
      if (p.shape === 'circle') {
        ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillRect(-p.r, -p.r * 1.5, p.r * 2, p.r * 3);
      }
      ctx.restore();
    });

    if (frame < maxFrames) requestAnimationFrame(draw);
    else canvas.style.display = 'none';
  }

  window.addEventListener('load', () => setTimeout(draw, 300));
})();
</script>
